<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ticket Form</title>
    <link rel="stylesheet" href="styles.css">
    <script src="scripts.js" defer></script>
    <link rel="icon" href="../ponder/week7-10/favicon.ico">
</head>
<body>
    <header></header>
    <main>
        <div id="content">
            <form id="ticket" action="">
                <h1 class="field full">Event Ticket</h1>
                <div class="field">
                    <label for="fname">First Name</label>
                    <input type="text" id="fname" name="fname" required>
                </div>
                <div class="field">
                    <label for="lname">Last Name</label>
                    <input type="text" id="lname" name="lname">
                </div>
                <div class="field full">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" required>
                </div>
                <div class="field">
                    <label for="Visitor Type">Visitor Type</label>
                    <select name="type" id="type" required>
                        <option value="">Choose One</option>
                        <option value="student">Student</option>
                        <option value="guest">General Guest</option>
                    </select>
                </div>
                <div class="field">
                    <label for="date">Event Date</label>
                    <input type="date" name="date" id="date">
                </div>
                <div class="field full" id="studentId" hidden>
                    <label for="number">Student ID#</label>
                    <input type="number" name="number" id="number">
                </div>
                <div class="field full" id="generalCode" hidden>
                    <label for="code">Event Code</label>
                    <input type="text" name="code" id="code" maxlength="8">
                </div>
                <div class="field full">
                    <button type="submit">Create Ticket</button>
                </div>
                <section id="output" aria-live="polite"></section>
            </form>
        </div>
    </main>
    <footer>
        <p>
            Created on __/__/____ by ZMAForge in completion of Prove 7 for WDD131
        </p>
    </footer>
</body>
</html>
