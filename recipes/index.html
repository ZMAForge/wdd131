<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RecipeBook</title>
    <meta name="description" content="A Simple Recipe Book">
    <meta name="author" content="Zelda Asvitt">
    <link rel="stylesheet" href="styles.css">
    <script src="scripts.js" defer></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Amatic+SC:wght@400;700&display=swap" rel="stylesheet">
                            
    <!-- Open Graph (Facebook, LinkedIn, etc.) -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="Recipe Book">
    <meta property="og:description" content="A Simple Recipe Book">
    <meta property="og:url" content="https://zmaforge.gitub.io/wdd131/charactercard/">
    <meta property="og:image" content="social-preview-img.png">

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Recipe Book">
    <meta name="twitter:description" content="A Simple Recipe Book">
    <meta name="twitter:image" content="placeholder">

    <!-- One favicon (ICO works everywhere) -->
    <link rel="icon" href="icon.png">

    <!-- One Apple Touch Icon (iOS home screen) -->
    <link rel="apple-touch-icon" href="appletouch.png">
</head>
<body>
    <div id="content">
        <header>
        <div class="logo">
            <img src="images/recipe-book.png" alt="An image of a book with a chef hat on it, rendered in black and white using only simple lines">
            <h1>RecipeBook</h1>
        </div>
        <div id="search">
            <input type="text" id="search" name="search" placeholder="Search">
            <button><img src="images/search.svg" alt="A search Icon"></button>
        </div>
    </header>
    <main>
    </main>
    <footer>
        <div class="social">
            <!-- Social media icons provided under CC from https://www.iconfinder.com/AlfredoCreates  -->
            <a href="#"><img src="images/instagram_icon.svg" alt="instagram icon"></a>
            <a href="#"><img src="images/youtube_icon.svg" alt="youtube icon"></a>
            <a href="#"><img src="images/pinterest_icon.svg" alt="pinterest icon"></a>
        </div>                              
        <a href="https://www.flaticon.com/free-icons/recipe" title="recipe icons">Recipe icons created by Freepik - Flaticon</a>
    </footer>
    </div>

</html>
